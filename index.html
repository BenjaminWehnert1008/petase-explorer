<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PETase Variant Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root">
      <div id="initial-loader" style="padding:40px;font-family:Inter,sans-serif;color:#5B6B6B;font-size:14px">
        Loading variant data…
      </div>
    </div>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        var d = document.getElementById("root");
        if (d) d.innerHTML =
          '<div style="padding:40px;font-family:monospace;background:#F7F5EF;min-height:100vh;color:#B6452C">' +
          '<h2 style="font-family:Georgia,serif;color:#B6452C">JavaScript error</h2>' +
          '<pre style="background:#fff;border:1px solid #EDE9DE;border-radius:6px;padding:16px;font-size:12px;overflow-x:auto;color:#0B1418">' +
          (msg + "\n\n" + src + ":" + line + "\n\n" + (err && err.stack ? err.stack : "")) +
          '</pre></div>';
      };
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
